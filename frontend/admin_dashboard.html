<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard — Manage coding problems — AST-Compiler">
    <title>Admin Dashboard — AST-Compiler</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo-icon" style="background: linear-gradient(135deg, #0f3460 0%, #e94560 100%);">🔧</div>
            <span>AST-Compiler <span style="font-size: 0.7rem; color: var(--text-muted); font-weight: 400;">ADMIN</span></span>
        </div>
        <div class="navbar-actions">
            <div class="navbar-user">
                <div class="avatar" id="userAvatar">A</div>
                <span id="userName">Admin</span>
            </div>
            <button class="btn btn-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Dashboard -->
    <div class="admin-container">
        <div class="admin-header">
            <h1>📋 Problem Management</h1>
            <a href="/admin_edit.html" class="btn btn-primary">+ Create Problem</a>
        </div>

        <!-- Problems Table -->
        <table class="admin-table" id="problemsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Difficulty</th>
                    <th>Topics</th>
                    <th>Languages</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="problemsTableBody">
                <!-- Rendered by JS -->
            </tbody>
        </table>

        <div class="empty-state hidden" id="emptyState">
            <div class="icon">📭</div>
            <h3>No problems yet</h3>
            <p>Create your first problem to get started.</p>
            <a href="/admin_edit.html" class="btn btn-primary" style="margin-top: 16px;">+ Create Problem</a>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Confirm Delete Modal -->
    <div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; backdrop-filter:blur(4px);">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:32px; border-radius:var(--radius-lg); max-width:400px; width:90%;" class="glass-card">
            <h3 style="margin-bottom:12px;">Delete Problem</h3>
            <p style="color:var(--text-secondary); margin-bottom:24px;">Are you sure you want to delete this problem? This action cannot be undone.</p>
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
