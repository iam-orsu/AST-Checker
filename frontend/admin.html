<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login — AST-Compiler">
    <title>Admin Login — AST-Compiler</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="logo" style="background: linear-gradient(135deg, #0f3460 0%, #e94560 100%);">🔧</div>
            <h1>Admin Panel</h1>
            <p class="subtitle">AST-Compiler Problem Management</p>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <div id="loginError" class="login-error"></div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In as Admin
                </button>
            </form>

            <div style="margin-top: 24px; font-size: 0.8rem; color: var(--text-muted);">
                <p><a href="/index.html">← Back to user login</a></p>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in as admin
        (function() {
            const token = localStorage.getItem('ast_token');
            const role = localStorage.getItem('ast_role');
            if (token && role === 'admin') {
                window.location.href = '/admin_dashboard.html';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (data.success && data.role === 'admin') {
                    localStorage.setItem('ast_token', data.token);
                    localStorage.setItem('ast_role', data.role);
                    localStorage.setItem('ast_username', username);
                    window.location.href = '/admin_dashboard.html';
                } else if (data.success && data.role !== 'admin') {
                    errorEl.textContent = 'This login is for admin users only.';
                    errorEl.style.display = 'block';
                    errorEl.classList.add('visible');
                } else {
                    errorEl.textContent = data.message || 'Invalid credentials';
                    errorEl.style.display = 'block';
                    errorEl.classList.add('visible');
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Is the server running?';
                errorEl.style.display = 'block';
                errorEl.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In as Admin';
            }
        });
    </script>
</body>
</html>
